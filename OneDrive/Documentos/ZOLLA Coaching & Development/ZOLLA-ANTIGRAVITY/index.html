    <script>
        // Aplicar Branding de Tenant al cargar
        document.addEventListener('DOMContentLoaded', () => {
            const config = window.getTenantConfig();
            if (config) {
                const nameEl = document.getElementById('tenant-name');
                const taglineEl = document.getElementById('tenant-tagline');
                if (nameEl) nameEl.innerHTML = `${config.brand.logoText} <span class="text-emerald-400">IA</span>`;
                if (taglineEl) taglineEl.innerText = `${config.brand.tagline}`;
            }
        });
    </script>

    <!-- Notification System -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-[999] flex flex-col gap-3"></div>
    <script>
        window.showNotification = (title, message, type = 'warning') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');

            const colors = {
                warning: 'bg-white border-amber-200 shadow-amber-500/10 text-amber-600',
                success: 'bg-white border-emerald-200 shadow-emerald-500/10 text-emerald-600',
                info: 'bg-white border-blue-200 shadow-blue-500/10 text-blue-600'
            };

            const icons = {
                warning: 'fa-bell text-amber-500',
                success: 'fa-check-circle text-emerald-500',
                info: 'fa-info-circle text-blue-500'
            };

            toast.className = `p-4 rounded-2xl shadow-xl w-80 border transform transition-all duration-500 translate-x-full opacity-0 flex items-start gap-4 ${colors[type]}`;
            toast.innerHTML = `
                <div class="mt-1"><i class="fas ${icons[type]} text-lg animate-bounce"></i></div>
                <div class="flex-1">
                    <p class="font-bold text-slate-800 text-sm mb-1">${title}</p>
                    <p class="text-[11px] font-medium text-slate-500 leading-tight">${message}</p>
                </div>
                <button class="text-slate-400 hover:text-slate-600 transition-all text-xs" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>
            `;

            container.appendChild(toast);

            // Animate in
            setTimeout(() => {
                toast.classList.remove('translate-x-full', 'opacity-0');
            }, 100);

            // Auto remove
            setTimeout(() => {
                toast.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => toast.remove(), 500);
            }, 6000);
        };

        // Trigger task reminder after initial load
        setTimeout(() => {
            window.showNotification('ATENCIÓN REQUERIDA', 'Tienes 3 tareas estratégicas pendientes de ejecución esta semana. No olvides actualizarlas en el Planificador.', 'warning');
        }, 2500);
    </script>
